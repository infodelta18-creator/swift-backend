<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Netlivy Status</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

<style>
:root{
  --bg:#000;
  --card:#0b0b0b;
  --blue:#1e7bff;
  --text:#e6edf3;
  --muted:#8b949e;
  --warn:#f5a623;
  --down:#ff4d4d;
}

*{margin:0;padding:0;box-sizing:border-box;font-family:Inter,sans-serif;}
body{background:var(--bg);color:var(--text);}

/* HEADER */
.header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:18px 20px;
}
.logo {
  height: 58px;   /* KATTALASHTIRADI */
  width: auto;
  object-fit: contain;
  filter: brightness(0) invert(1); /* qora logoni oq qiladi */
}

.subscribe{
  border:1px solid #333;
  padding:10px 18px;
  border-radius:12px;
  background:#0d0d0d;
}

/* GLOBAL STATUS */
.global-status{
  margin:20px;
  background:var(--blue);
  padding:20px;
  border-radius:14px;
  font-size:20px;
  font-weight:600;
}

/* SERVICE BLOCK */
.service{
  padding:26px 20px;
  border-bottom:1px solid #111;
}

.service-top{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:14px;
}

.service-name{
  font-size:22px;
  font-weight:600;
}

.service-state{
  color:var(--blue);
}

.bars{
  display:flex;
  gap:6px;
  margin-bottom:10px;
}

.bar{
  width:6px;
  height:34px;
  background:var(--blue);
  border-radius:4px;
  opacity:.9;
}

.bar.warn{background:var(--warn);}
.bar.down{background:var(--down);}

.timeline{
  display:flex;
  justify-content:space-between;
  color:var(--muted);
  font-size:15px;
}
</style>
</head>
<body>

<div class="header">
  <img src="netlivylogo.png" alt="Logo" class="logo">
 <a href="https://instagram.com/car1movvvv" class="subscribe" style="text-decoration:none; color:inherit;">Subscribe</a>
</div>

<div class="global-status">✔ All Systems Operational</div>

<!-- SERVICE TEMPLATE -->
<div id="services"></div>

<script>
const services = [
  {name:"AI Gateway", issues:[]},
  {name:"API", issues:[{day:9,type:"warn"}]},
  {name:"Yuklanish", issues:[{day:10,type:"warn"},{day:27,type:"down"}]},
  {name:"CI/CD", issues:[]},
    {name:"CPU", issues:[]},
    {name:"Database", issues:[{day:25,type:"warn"}]},
   {name:"Server", issues:[]},
   {name:"Hosting", issues:[]},
  {name:"Community", issues:[]}
];

const container=document.getElementById("services");

services.forEach(service=>{
  const div=document.createElement("div");
  div.className="service";

  const top=document.createElement("div");
  top.className="service-top";

  top.innerHTML=`
    <div class="service-name">${service.name}</div>
    <div class="service-state">Operational</div>
  `;

  const bars=document.createElement("div");
  bars.className="bars";

  for(let i=1;i<=30;i++){
    const b=document.createElement("div");
    b.className="bar";
    const issue=service.issues.find(x=>x.day===i);
    if(issue) b.classList.add(issue.type);
    bars.appendChild(b);
  }

  const timeline=document.createElement("div");
  timeline.className="timeline";
  timeline.innerHTML=`<span>30 days ago</span><span>Today</span>`;

  div.appendChild(top);
  div.appendChild(bars);
  div.appendChild(timeline);
  container.appendChild(div);
});
</script>

</body>
</html>
